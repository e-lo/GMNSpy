site_name: "GMNSpy + datagrove"
site_description: "Umbrella landing — pick datagrove or gmnspy."
site_url: https://e-lo.github.io/GMNSpy
repo_url: https://github.com/e-lo/GMNSpy
edit_uri: edit/main/docs

# Tiny umbrella site — one page that routes to each package's own
# documentation site. The substantive docs live in each package:
#
#   packages/datagrove/docs/  → built independently → deployed at /datagrove/
#   packages/gmnspy/docs/     → built independently → deployed at /gmnspy/
#
# See packages/datagrove/mkdocs.yml + packages/gmnspy/mkdocs.yml for
# the actual content sites.

theme:
  name: material
  features:
    - navigation.top
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
