site_name: "Python Package for General Model Network Specification (GMNS)"
site_url: https://e-lo.github.io/GMNSpy
repo_url: https://github.com/e-lo/GMNSpy
edit_uri: edit/main/docs

# Contributor-facing pages (anything starting with `_`) are excluded
# from the public site but live under docs/ so contributors find them
# alongside the published pages.
exclude_docs: |
  _*.md

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.expand
    - toc.integrate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: grey
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: grey
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

plugins:
  - autorefs
  - awesome-pages
  - mkdocstrings
  - macros
  - mermaid2:
      arguments:
        theme: |
            ^(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light'
        securityLevel: 'loose'
  - search

watch:
  - CONTRIBUTING.md
  - CODE_OF_CONDUCT.md
  - CONTRIBUTORS.md
  - README.md

extra_javascript:
  - https://unpkg.com/mermaid@9.4.3/dist/mermaid.min.js

extra_css:
  - https://use.fontawesome.com/releases/v5.13.0/css/all.css

markdown_extensions:
  - admonition
  - codehilite:
      linenums: true
  - meta
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.smartsymbols
  - smarty
  - toc:
      # insert a blank space before the character
      permalink: " ¶"
      toc_depth: 2


nav:
  - Home: index.md
  - Get started:
      - Quickstart: intro/quickstart.md
      - What is GMNS?: intro/what-is-gmns.md
      - Visual tour: intro/visual-tour.md
  - Cookbook:
      - Overview: cookbook/index.md
  - Reference:
      - API: reference/api.md
      - Schema: reference/spec.md
      - Table of tables: reference/table-of-tables.md
      - Glossary: reference/glossary.md
  - Migration: migration/v0.3-to-v1.0.md
  - AI surface: ai/index.md
  - Architecture: architecture.md
  - Development: development.md
