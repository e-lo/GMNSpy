[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "datagrove"
version = "0.1.0.dev0"
description = "Generic Frictionless-aligned tabular-data-package engine. Code-agnostic schemas, lazy ibis/duckdb pipelines, foreign-key + sync-state validation, geographic scoping, and edit/rollback primitives."
readme = "README.md"
license = "Apache-2.0"
license-files = ["../../LICENSE"]
requires-python = ">=3.11"
authors = [{ name = "Elizabeth Sall" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Developers",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "pydantic>=2.6",
    "ibis-framework[duckdb]>=9.0",
    "duckdb>=1.0",
    "pyarrow>=16",
    "fsspec>=2024.3",
    "frictionless>=5.16",
    "rich>=13",
    "jinja2>=3.1",
]

[project.optional-dependencies]
polars = ["polars>=1.0"]
pandas = ["pandas>=2.2"]
s3 = ["s3fs>=2024.3"]
gcs = ["gcsfs>=2024.3"]
azure = ["adlfs>=2024.3"]
keyring = ["keyring>=24"]
mcp = ["mcp>=1.0"]

[project.urls]
Homepage = "https://e-lo.github.io/GMNSpy"
Source = "https://github.com/e-lo/GMNSpy"
Issues = "https://github.com/e-lo/GMNSpy/issues"

[tool.hatch.build.targets.wheel]
packages = ["datagrove"]
