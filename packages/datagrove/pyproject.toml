[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "datagrove"
version = "0.1.0.dev0"
description = "Generic Frictionless-aligned tabular-data-package engine. Code-agnostic schemas, lazy ibis/duckdb pipelines, foreign-key + sync-state validation, geographic scoping, and edit/rollback primitives."
readme = "README.md"
license = "Apache-2.0"
# NB: this file is a copy of the workspace-root LICENSE so that the
# published wheel actually contains it. Hatchling silently skips
# license-files entries that go outside the package directory
# (`../../LICENSE` produced wheels with no License-File: metadata and
# no licenses/ directory). The dev workflow keeps the workspace
# LICENSE authoritative; the per-package copies are duplicated for
# wheel-build only.
license-files = ["LICENSE"]
requires-python = ">=3.11"
authors = [{ name = "Elizabeth Sall" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Developers",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "pydantic>=2.6",
    "ibis-framework[duckdb]>=9.0",
    "duckdb>=1.0",
    "pyarrow>=16",
    "fsspec>=2024.3",
    "rich>=13",
    "jinja2>=3.1",
    "typer>=0.12",
]
# Note: we model the Frictionless Data Package *format* (an open spec)
# with our own Pydantic types — we do NOT depend on the `frictionless`
# library. We have engines doing the actual data work and our own
# validators; pulling in frictionless would add ~20 transitive deps
# (jsonschema, validators, marko, etc.) for no functionality we use.

[project.optional-dependencies]
polars = ["polars>=1.0"]
pandas = ["pandas>=2.2"]
s3 = ["s3fs>=2024.3"]
gcs = ["gcsfs>=2024.3"]
azure = ["adlfs>=2024.3"]
keyring = ["keyring>=24"]
mcp = ["mcp>=1.0"]

[project.urls]
Homepage = "https://e-lo.github.io/GMNSpy"
Source = "https://github.com/e-lo/GMNSpy"
Issues = "https://github.com/e-lo/GMNSpy/issues"

[project.scripts]
datagrove = "datagrove.cli.app:app"

[tool.hatch.build.targets.wheel]
# Explicit include — we list every non-Python data file the package
# ships (bundled HTML-renderer template assets + the sample fixture
# CSV/Parquet/DuckDB/datapackage.json) so that a future gitignore tweak
# can't silently drop them from the wheel. Hatchling defaults pick up
# .py files but not resource siblings; without this, render_html() and
# the bundled sample fixture would both import-error on installed
# wheels.
packages = ["datagrove"]
include = [
    "datagrove/**/*.py",
    # HTML-report renderer templates.
    "datagrove/reports/templates/report.html.j2",
    "datagrove/reports/templates/report.css",
    "datagrove/reports/templates/report.js",
    # Bundled sample fixture (see datagrove/fixtures/sample/README.md
    # for provenance + why it lives here separately from
    # gmnspy.fixtures.leavenworth).
    "datagrove/fixtures/**/*.csv",
    "datagrove/fixtures/**/*.parquet",
    "datagrove/fixtures/**/*.duckdb",
    "datagrove/fixtures/**/datapackage.json",
    "datagrove/fixtures/**/README.md",
]

[tool.hatch.build.targets.sdist]
include = ["datagrove", "README.md"]
