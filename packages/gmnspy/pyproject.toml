[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "gmnspy"
version = "1.0.0.dev0"
description = "Python toolkit for the General Modeling Network Specification (GMNS). Fast I/O at regional scale (parquet/duckdb/zip/URL), foreign-key validation with out-of-sync awareness, geographic + network-aware scoping, data-quality checks, network editing with atomic rollback, and a CLI + notebook + programmatic API."
readme = "README.md"
license = "Apache-2.0"
license-files = ["../../LICENSE"]
requires-python = ">=3.11"
authors = [{ name = "Elizabeth Sall" }]
keywords = ["gmns", "transportation", "network", "modeling", "frictionless"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering",
    "Topic :: Scientific/Engineering :: GIS",
]
dependencies = [
    "datagrove",  # transitively brings typer + rich + ibis + duckdb + pyarrow + fsspec
]

[project.optional-dependencies]
clean = [
    "shapely>=2.0",
    "geopandas>=1.0",
    "igraph>=0.11",
    "pyproj>=3.6",
]
server = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "pydantic-settings>=2.2",
]
mcp = [
    "mcp>=1.0",
]
notebook = [
    "ipywidgets>=8.1",
    "anywidget>=0.9",
]
all = [
    "gmnspy[clean,server,mcp,notebook]",
]
dev-fixtures = [
    # Only required to *rebuild* bundled example fixtures (e.g. Leavenworth).
    # Consumers loading the bundled csv/parquet/duckdb fixtures need none of these.
    "osmnx>=1.9",
    "shapely>=2.0",
    "pandas>=2.2",
    "pyarrow>=16",
    "duckdb>=1.0",
]

[project.urls]
Homepage = "https://e-lo.github.io/GMNSpy"
Source = "https://github.com/e-lo/GMNSpy"
Issues = "https://github.com/e-lo/GMNSpy/issues"
Changelog = "https://github.com/e-lo/GMNSpy/blob/main/CHANGELOG.md"

[project.scripts]
gmnspy = "gmnspy.cli.app:app"

[project.entry-points."datagrove.quality.rules"]
# Discovered + registered automatically by datagrove.quality.run_quality on
# first call. `register_all` is a zero-arg factory returning the rule
# instances; it also calls register_rule on each so direct-invocation works.
gmnspy_rules = "gmnspy.quality:register_all"

[tool.hatch.build.targets.wheel]
# Explicit include — we list every non-Python data file the package ships
# (vendored GMNS spec JSON + bundled example-network binaries) so that a
# future gitignore tweak can't silently drop them from the wheel.
#
# The previous `artifacts = [...]` block was for re-including
# gitignored files, which doesn't apply here (none of these are
# gitignored). Switching to `include` makes packaging deterministic
# regardless of gitignore state.
packages = ["gmnspy"]
include = [
    "gmnspy/**/*.py",
    "gmnspy/spec/**/*.json",
    "gmnspy/spec/**/VERSION",
    "gmnspy/spec/**/README.md",
    # Bundled example networks (Leavenworth, WA; see
    # gmnspy/fixtures/leavenworth/README.md for provenance).
    "gmnspy/fixtures/**/*.csv",
    "gmnspy/fixtures/**/*.parquet",
    "gmnspy/fixtures/**/*.duckdb",
    "gmnspy/fixtures/**/*.zip",
    "gmnspy/fixtures/**/datapackage.json",
    "gmnspy/fixtures/**/README.md",
]

[tool.hatch.build.targets.sdist]
include = ["gmnspy", "README.md"]
