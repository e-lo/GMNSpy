[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "gmnspy"
version = "1.0.0.dev0"
description = "Python toolkit for the General Modeling Network Specification (GMNS). Fast I/O at regional scale (parquet/duckdb/zip/URL), foreign-key validation with out-of-sync awareness, geographic + network-aware scoping, data-quality checks, network editing with atomic rollback, and a CLI + notebook + programmatic API."
readme = "README.md"
license = "Apache-2.0"
license-files = ["../../LICENSE"]
requires-python = ">=3.11"
authors = [{ name = "Elizabeth Sall" }]
keywords = ["gmns", "transportation", "network", "modeling", "frictionless"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering",
    "Topic :: Scientific/Engineering :: GIS",
]
dependencies = [
    "datagrove",  # transitively brings typer + rich + ibis + duckdb + frictionless
]

[project.optional-dependencies]
clean = [
    "shapely>=2.0",
    "geopandas>=1.0",
    "igraph>=0.11",
    "pyproj>=3.6",
]
server = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "pydantic-settings>=2.2",
]
mcp = [
    "mcp>=1.0",
]
notebook = [
    "ipywidgets>=8.1",
    "anywidget>=0.9",
]
all = [
    "gmnspy[clean,server,mcp,notebook]",
]

[project.urls]
Homepage = "https://e-lo.github.io/GMNSpy"
Source = "https://github.com/e-lo/GMNSpy"
Issues = "https://github.com/e-lo/GMNSpy/issues"
Changelog = "https://github.com/e-lo/GMNSpy/blob/main/CHANGELOG.md"

[project.scripts]
gmnspy = "gmnspy.cli.app:app"

[tool.hatch.build.targets.wheel]
packages = ["gmnspy"]
artifacts = ["gmnspy/spec/**/*.json", "gmnspy/spec/**/VERSION", "gmnspy/spec/**/README.md"]

[tool.hatch.build.targets.sdist]
include = ["gmnspy", "README.md"]
