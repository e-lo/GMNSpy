name: Tests

on:
  push:
    branches: [main, develop, "refactor/**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install workspace
        run: uv sync --all-packages
      - name: Ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Import-linter (architectural boundaries)
        run: uv run lint-imports
      - name: No raw SQL outside datagrove.engines.ibis_engine
        run: uv run python scripts/lint_no_sql.py

  wheel-smoke:
    # Build the gmnspy wheel and verify the bundled Leavenworth fixture
    # binaries (parquet/duckdb/csv/zip + datapackage.json) are actually
    # present inside the wheel. Guards I3 — packaging regression that
    # would silently drop the fixtures from the wheel.
    #
    # Notes:
    # * We inspect wheel members directly rather than `pip install` the
    #   wheel, because `datagrove` is workspace-local and not on PyPI yet
    #   (an install would fail dependency resolution). Once datagrove is
    #   published, swap this for a fresh-venv install + import check.
    # * Local equivalent:
    #     rm -rf /tmp/wheel-test
    #     uv build --package gmnspy --out-dir /tmp/wheel-test
    #     uv run python -m zipfile -l /tmp/wheel-test/gmnspy-*.whl \
    #         | grep -E 'fixtures.*(parquet|duckdb|\.zip|datapackage)'
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Build gmnspy wheel
        run: |
          rm -rf /tmp/wheel-test
          uv build --package gmnspy --out-dir /tmp/wheel-test
      - name: Verify fixture binaries packaged in wheel
        run: |
          uv run python - <<'PY'
          import sys, zipfile
          from pathlib import Path
          wheels = list(Path("/tmp/wheel-test").glob("gmnspy-*.whl"))
          assert len(wheels) == 1, wheels
          names = zipfile.ZipFile(wheels[0]).namelist()
          fx = "gmnspy/fixtures/leavenworth"
          required_files = [
              f"{fx}/datapackage.json",
              f"{fx}/leavenworth.duckdb",
              f"{fx}/leavenworth.csv.zip",
          ]
          required_globs = {
              "parquet": lambda n: n.startswith(f"{fx}/parquet/") and n.endswith(".parquet"),
              "csv":     lambda n: n.startswith(f"{fx}/csv/") and n.endswith(".csv"),
          }
          missing = [f for f in required_files if f not in names]
          if missing:
              print(f"wheel-smoke FAILED: missing required files: {missing}", file=sys.stderr)
              sys.exit(1)
          for label, pred in required_globs.items():
              n = sum(1 for x in names if pred(x))
              if n == 0:
                  print(f"wheel-smoke FAILED: no {label} files matched in wheel", file=sys.stderr)
                  sys.exit(1)
              print(f"  {label}: {n} files")
          print(f"wheel-smoke OK ({len(names)} members in {wheels[0].name})")
          PY

  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.11', '3.12', '3.13']
        include:
          - os: macos-latest
            python-version: '3.13'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install workspace (with all extras for --doctest-modules)
        # --doctest-modules makes pytest import every module under the package
        # to scan for doctests. Modules that import optional deps at module
        # top level (api/app.py → fastapi, polars_engine.py → polars,
        # mcp/server.py → mcp) fail to import without the corresponding
        # extras. Install them all so the doctest sweep can collect every
        # file. Tests with `pytest.importorskip("…")` still skip cleanly
        # when an extra is genuinely missing.
        run: uv sync --all-packages --all-extras
      - name: Test datagrove
        run: uv run pytest packages/datagrove/tests --doctest-modules packages/datagrove/datagrove
      - name: Test gmnspy
        run: uv run pytest packages/gmnspy/tests --doctest-modules packages/gmnspy/gmnspy
      # Coverage gates are per-package so a regression in one package
       # can't be masked by overshoot in the other. Baseline measured
       # 2026-05-26: datagrove 87%, gmnspy 85%. Gates set one point
       # below current to flag regressions without flaking on noise.
       # Per-package run is also more accurate — pytest --cov needs
       # the package source mapped to test paths, and the workspace-
       # wide run conflates the two.
      - name: Coverage gate — datagrove ≥86%
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: uv run pytest packages/datagrove/tests --cov=datagrove --cov-fail-under=86 --cov-report=term
      - name: Coverage gate — gmnspy ≥84%
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: uv run pytest packages/gmnspy/tests --cov=gmnspy --cov-fail-under=84 --cov-report=term
      - name: Combined coverage XML for codecov upload
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: uv run pytest --cov --cov-report=xml --cov-report=term
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
