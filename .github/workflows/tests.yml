name: Tests

on:
  push:
    branches: [main, develop, "refactor/**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install workspace
        run: uv sync --all-packages
      - name: Ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Import-linter (architectural boundaries)
        run: uv run lint-imports

  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.11', '3.12', '3.13']
        include:
          - os: macos-latest
            python-version: '3.13'
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install workspace
        run: uv sync --all-packages
      - name: Test datagrove
        run: uv run pytest packages/datagrove/tests --doctest-modules packages/datagrove/datagrove
      - name: Test gmnspy
        run: uv run pytest packages/gmnspy/tests --doctest-modules packages/gmnspy/gmnspy
      - name: Coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: uv run pytest --cov --cov-report=xml --cov-report=term
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
