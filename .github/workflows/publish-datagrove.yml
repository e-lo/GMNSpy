name: Publish datagrove to PyPI

on:
  push:
    tags: ['datagrove-v*']
  workflow_dispatch:
    inputs:
      target:
        description: 'Publish target (pypi or testpypi)'
        required: true
        default: 'testpypi'
        type: choice
        options: [pypi, testpypi]

jobs:
  build:
    name: Build datagrove distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v3
      - name: Build sdist + wheel
        run: uv build --package datagrove --out-dir dist
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: datagrove-dist
          path: dist/

  publish-pypi:
    name: Publish datagrove to PyPI
    if: startsWith(github.ref, 'refs/tags/datagrove-v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/datagrove
    permissions:
      id-token: write  # OIDC for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: datagrove-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    name: Publish datagrove to TestPyPI
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/datagrove
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: datagrove-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
