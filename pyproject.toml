# Workspace root for the GMNSpy + datagrove monorepo.
#
# This file is NOT a publishable package — it carries the uv workspace
# declaration and shared development tooling configuration (ruff,
# pyright, import-linter, pytest, coverage) for both packages.
#
# Distributable packages live in packages/ — see:
#   packages/datagrove/pyproject.toml   (generic engine)
#   packages/gmnspy/pyproject.toml      (GMNS-specific)

[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
datagrove = { workspace = true }

# ---------------------------------------------------------------------------
# Shared dev tooling
# ---------------------------------------------------------------------------

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "pytest-benchmark>=4",
    "hypothesis>=6.100",
    "ruff>=0.5",
    "pyright>=1.1.370",
    "import-linter>=2.0",
    "pre-commit>=3.7",
    "mkdocs>=1.6",
    "mkdocs-material>=9.5",
    "mkdocs-macros-plugin>=1.0",
    "mkdocs-mermaid2-plugin>=1.1",
    "mkdocstrings[python]>=0.25",
    "mike>=2.1",
]

# ---------------------------------------------------------------------------
# Ruff (replaces black + flake8 + isort)
# ---------------------------------------------------------------------------

[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = ["gmnspy", "tests", "_archive"]  # legacy tree; removed at Phase 0 closeout

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "W",    # pycodestyle warnings
    "I",    # isort
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific
    "D",    # pydocstyle (Google convention)
]
ignore = [
    "D100",  # missing docstring in public module
    "D104",  # missing docstring in public package
    "D203",  # incorrect-blank-line-before-class
    "D213",  # multi-line-summary-second-line
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["D"]
"**/__init__.py" = ["D"]

# ---------------------------------------------------------------------------
# Pyright (strict on datagrove; standard on gmnspy)
# ---------------------------------------------------------------------------

[tool.pyright]
include = ["packages/datagrove/datagrove", "packages/gmnspy/gmnspy"]
exclude = ["**/__pycache__", "**/_archive", "**/legacy"]
pythonVersion = "3.11"
typeCheckingMode = "basic"

[[tool.pyright.executionEnvironments]]
root = "packages/datagrove/datagrove"
extraPaths = ["packages/datagrove"]

[[tool.pyright.executionEnvironments]]
root = "packages/gmnspy/gmnspy"
extraPaths = ["packages/gmnspy", "packages/datagrove"]

# ---------------------------------------------------------------------------
# Import-linter — enforce architectural boundaries
# ---------------------------------------------------------------------------
# Rules:
#   - datagrove may not import from gmnspy
#   - gmnspy.clean / .server / .mcp are optional extras (no required import
#     of these from gmnspy core)
#   - Raw SQL strings outside datagrove.engines.ibis_engine are forbidden
#     (enforced separately by a ruff plugin / custom check; see ./scripts/lint_no_sql.py)

[tool.importlinter]
root_packages = ["datagrove", "gmnspy"]
include_external_packages = false

[[tool.importlinter.contracts]]
name = "datagrove must not depend on gmnspy"
type = "forbidden"
source_modules = ["datagrove"]
forbidden_modules = ["gmnspy"]

[[tool.importlinter.contracts]]
name = "gmnspy core must not require optional-extra submodules"
type = "forbidden"
source_modules = [
    "gmnspy.network",
    "gmnspy.semantics",
    "gmnspy.scope",
    "gmnspy.indexes",
    "gmnspy.quality",
    "gmnspy.cli",
]
forbidden_modules = [
    "gmnspy.clean",
    "gmnspy.server",
    "gmnspy.mcp",
]

# ---------------------------------------------------------------------------
# Pytest
# ---------------------------------------------------------------------------

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["packages/datagrove/tests", "packages/gmnspy/tests"]
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
    "--doctest-modules",
    "--ignore=gmnspy",          # legacy tree (Phase 0 closeout removes)
    "--ignore=tests",           # legacy tree
    "--ignore=_archive",
]
filterwarnings = [
    "error",
    "ignore::DeprecationWarning:frictionless.*",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "perf: performance regression bench",
    "integration: cross-package integration",
]

# ---------------------------------------------------------------------------
# Coverage
# ---------------------------------------------------------------------------

[tool.coverage.run]
source = ["packages/datagrove/datagrove", "packages/gmnspy/gmnspy"]
branch = true
omit = ["*/tests/*", "*/_legacy/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "@overload",
]
fail_under = 0  # raised to 85 (datagrove) / 75 (gmnspy) at Phase 5 closeout
