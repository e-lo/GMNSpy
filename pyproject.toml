# Workspace root for the GMNSpy + datagrove monorepo.
#
# This file is NOT a publishable package — it carries the uv workspace
# declaration and shared development tooling configuration (ruff,
# pyright, import-linter, pytest, coverage) for both packages.
#
# Distributable packages live in packages/ — see:
#   packages/datagrove/pyproject.toml   (generic engine)
#   packages/gmnspy/pyproject.toml      (GMNS-specific)

[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
datagrove = { workspace = true }

# ---------------------------------------------------------------------------
# Shared dev tooling
# ---------------------------------------------------------------------------

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "pytest-benchmark>=4",
    "hypothesis>=6.100",
    "ruff>=0.5",
    "pyright>=1.1.370",
    "import-linter>=2.0",
    "pre-commit>=3.7",
    "mkdocs>=1.6",
    "mkdocs-material>=9.5",
    "mkdocs-macros-plugin>=1.0",
    "mkdocs-mermaid2-plugin>=1.1",
    "mkdocstrings[python]>=0.25",
    "mike>=2.1",
]

# ---------------------------------------------------------------------------
# Ruff (replaces black + flake8 + isort)
# ---------------------------------------------------------------------------

[tool.ruff]
line-length = 120
target-version = "py311"
# Only exclude vendored upstream content (no Python source in these
# directories). The previous `["gmnspy", "tests", "_archive"]` exclusion
# was for the legacy pre-monorepo tree and inadvertently matched the new
# package path `packages/gmnspy/gmnspy/`, skipping all of its source from
# lint. Path-scoped exclusions only.
extend-exclude = [
    "packages/gmnspy/gmnspy/spec/0.95",
    "packages/gmnspy/gmnspy/spec/0.96",
    "packages/gmnspy/gmnspy/spec/0.97",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "W",    # pycodestyle warnings
    "I",    # isort
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific
    "D",    # pydocstyle (Google convention)
]
ignore = [
    "D100",  # missing docstring in public module
    "D104",  # missing docstring in public package
    "D203",  # incorrect-blank-line-before-class
    "D213",  # multi-line-summary-second-line
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["D"]
"**/__init__.py" = ["D"]
"scripts/**" = ["E501", "D"]  # scripts have long inline strings + don't need full docstrings
# Typer CLI command signatures use `typer.Argument(...)` / `typer.Option(...)`
# in argument defaults — that's the idiomatic typer API. B008 (function call
# in default) is a false positive for this pattern, scoped to cli/ paths only.
"**/cli/**" = ["B008"]

# ---------------------------------------------------------------------------
# Pyright (strict on datagrove; standard on gmnspy)
# ---------------------------------------------------------------------------

[tool.pyright]
include = ["packages/datagrove/datagrove", "packages/gmnspy/gmnspy"]
exclude = ["**/__pycache__", "**/_archive", "**/legacy"]
pythonVersion = "3.11"
typeCheckingMode = "basic"

[[tool.pyright.executionEnvironments]]
root = "packages/datagrove/datagrove"
extraPaths = ["packages/datagrove"]

[[tool.pyright.executionEnvironments]]
root = "packages/gmnspy/gmnspy"
extraPaths = ["packages/gmnspy", "packages/datagrove"]

# ---------------------------------------------------------------------------
# Import-linter — enforce architectural boundaries
# ---------------------------------------------------------------------------
# Rules:
#   - datagrove may not import from gmnspy
#   - gmnspy.clean / .server / .mcp are optional extras (no required import
#     of these from gmnspy core)
#   - Raw SQL strings outside datagrove.engines.ibis_engine are forbidden
#     (enforced separately by a ruff plugin / custom check; see ./scripts/lint_no_sql.py)

[tool.importlinter]
root_packages = ["datagrove", "gmnspy"]
include_external_packages = false

[[tool.importlinter.contracts]]
name = "datagrove must not depend on gmnspy"
type = "forbidden"
source_modules = ["datagrove"]
forbidden_modules = ["gmnspy"]

[[tool.importlinter.contracts]]
name = "gmnspy core must not require optional-extra submodules"
type = "forbidden"
# Source modules expand as the package grows; gmnspy.network etc. land in Phase 3.
source_modules = [
    "gmnspy.semantics",
    "gmnspy.scope",
    "gmnspy.indexes",
    "gmnspy.quality",
    "gmnspy.cli",
]
forbidden_modules = [
    "gmnspy.clean",
    "gmnspy.server",
    "gmnspy.mcp",
]

# ---------------------------------------------------------------------------
# Pytest
# ---------------------------------------------------------------------------

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["packages/datagrove/tests", "packages/gmnspy/tests"]
# importlib mode avoids module-name collisions when multiple packages each
# have a tests/__init__.py (otherwise both bind to "tests" and the second
# loses); also required for src-layout monorepos.
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
    "--doctest-modules",
    "--import-mode=importlib",
    "--ignore=gmnspy",          # legacy tree (Phase 0 closeout removes)
    "--ignore=tests",           # legacy tree
    "--ignore=_archive",
]
filterwarnings = [
    "error",
    # duckdb >= 1.5 deprecated fetch_arrow_table() in favour of to_arrow_table();
    # the ibis-framework duckdb backend still calls the deprecated name until
    # its next minor release. Narrow ignore — DO NOT broaden to a blanket
    # `ignore::DeprecationWarning:ibis.*`, which would hide future ibis
    # deprecations affecting us and defeat the warning-as-error policy.
    # TODO(deps): drop when ibis-framework releases a duckdb backend that
    # uses to_arrow_table(); track at https://github.com/ibis-project/ibis
    "ignore:fetch_arrow_table.*:DeprecationWarning",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "perf: performance regression bench",
    "integration: cross-package integration",
]

# ---------------------------------------------------------------------------
# Coverage
# ---------------------------------------------------------------------------

[tool.coverage.run]
source = ["packages/datagrove/datagrove", "packages/gmnspy/gmnspy"]
branch = true
omit = ["*/tests/*", "*/_legacy/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "@overload",
]
fail_under = 0  # raised to 85 (datagrove) / 75 (gmnspy) at Phase 5 closeout
